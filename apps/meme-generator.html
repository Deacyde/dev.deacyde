<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Generator — dev.deacyde.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d;
    --card: #161616;
    --card2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f1f5f9;
    --muted: #6b7280;
    --accent: #3b82f6;
    --accent-h: #2563eb;
    --accent-bg: rgba(59,130,246,0.12);
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ─── Top bar ─── */
  .top-bar { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border); background: var(--card); }
  .back-link { color: var(--muted); text-decoration: none; font-size: 0.85rem; }
  .back-link:hover { color: var(--text); }
  .top-bar h1 { font-size: 1.1rem; font-weight: 600; }
  .top-bar .sep { color: var(--border); }

  /* ─── Template strip ─── */
  .template-strip { background: var(--card); border-bottom: 1px solid var(--border); padding: 0.6rem 1rem; }
  .strip-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
  .strip-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
  .upload-mini { padding: 0.3rem 0.75rem; background: var(--card2); border: 1px dashed #3a3a3a; border-radius: 6px; color: var(--muted); font-size: 0.75rem; cursor: pointer; transition: border-color .15s, color .15s; }
  .upload-mini:hover { border-color: var(--accent); color: var(--text); }
  .thumb-scroll { overflow-x: auto; scrollbar-width: thin; scrollbar-color: #333 transparent; }
  .thumb-scroll::-webkit-scrollbar { height: 4px; }
  .thumb-scroll::-webkit-scrollbar-track { background: transparent; }
  .thumb-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .thumb-grid { display: grid; grid-template-rows: 1fr 1fr; grid-auto-columns: 72px; grid-auto-flow: column; gap: 5px; width: max-content; }
  .template-thumb { width: 72px; cursor: pointer; border: 2px solid transparent; border-radius: 6px; overflow: hidden; background: var(--card2); transition: border-color .15s; }
  .template-thumb:hover { border-color: #4b5563; }
  .template-thumb.active { border-color: var(--accent); }
  .template-thumb img { width: 100%; height: 55px; object-fit: cover; display: block; }
  .template-name { font-size: 0.58rem; color: var(--muted); text-align: center; padding: 2px 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }

  /* ─── Body layout ─── */
  .workspace { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 120px); }

  /* ─── Sidebar ─── */
  .sidebar { background: var(--card); border-right: 1px solid var(--border); padding: 1rem; overflow-y: auto; }
  .section-label { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 0.6rem; }
  .section-block { margin-bottom: 1.25rem; }
  hr { border: none; border-top: 1px solid var(--border); margin: 0.875rem 0; }

  label { font-size: 0.78rem; color: #9ca3af; display: block; margin-bottom: 3px; }
  input[type=text], textarea { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: .45rem .6rem; font-size: 0.82rem; outline: none; resize: none; font-family: inherit; }
  input[type=text]:focus, textarea:focus { border-color: var(--accent); }
  select { background: var(--card2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: .38rem .5rem; font-size: 0.8rem; outline: none; cursor: pointer; font-family: inherit; }
  select:focus { border-color: var(--accent); }
  input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
  input[type=color] { width: 32px; height: 26px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; padding: 1px; background: var(--card2); }

  .row { display: flex; gap: 8px; align-items: center; margin-bottom: .45rem; }
  .row label { margin: 0; flex: 1; }
  .size-val { font-size: 0.72rem; color: var(--muted); min-width: 22px; text-align: right; }

  .mode-tabs { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 0.75rem; }
  .mode-tab { flex: 1; padding: .42rem .3rem; background: var(--card2); border: none; color: var(--muted); font-size: 0.74rem; font-weight: 500; cursor: pointer; transition: all .15s; font-family: inherit; }
  .mode-tab.active { background: var(--accent-bg); color: var(--accent); }
  .mode-tab:hover:not(.active) { color: var(--text); }

  .panel { display: none; }
  .panel.visible { display: block; }

  .tool-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .tool-btn { padding: .35rem .65rem; background: var(--card2); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 0.76rem; cursor: pointer; transition: all .15s; white-space: nowrap; font-family: inherit; }
  .tool-btn:hover { border-color: #4b5563; color: var(--text); }
  .tool-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

  .undo-row { display: flex; gap: 5px; }
  .undo-row button { flex: 1; padding: .32rem; background: var(--card2); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 0.74rem; cursor: pointer; font-family: inherit; }
  .undo-row button:hover { border-color: #4b5563; color: var(--text); }
  .undo-row button:disabled { opacity: .3; cursor: default; }

  .download-btn { width: 100%; padding: .65rem; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background .15s; font-family: inherit; }
  .download-btn:hover { background: var(--accent-h); }

  /* ─── Canvas area ─── */
  .main { background: #080808; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
  .canvas-wrap { position: relative; box-shadow: 0 0 0 1px var(--border); }
  canvas { display: block; }
  .hint { color: #374151; font-size: 0.85rem; margin-top: 1rem; text-align: center; }
  .hint span { color: var(--accent); opacity: .7; }

  p.tip { color: var(--muted); font-size: 0.76rem; margin-bottom: 0.55rem; line-height: 1.5; }
</style>
</head>
<body>

<div class="top-bar">
  <a href="/" class="back-link">← dev.deacyde.com</a>
  <span class="sep">|</span>
  <h1>🎭 Meme Generator</h1>
</div>

<!-- Template strip -->
<div class="template-strip">
  <div class="strip-header">
    <span class="strip-label">Templates</span>
    <div class="upload-mini" onclick="document.getElementById('imgUpload').click()">📁 Upload image</div>
    <input type="file" id="imgUpload" accept="image/*" style="display:none">
  </div>
  <div class="thumb-scroll">
    <div class="thumb-grid" id="templateGrid"></div>
  </div>
</div>

<div class="workspace">
  <!-- Sidebar: tools only -->
  <div class="sidebar">

    <!-- Mode tabs -->
    <div class="section-block">
      <div class="section-label">Tools</div>
      <div class="mode-tabs">
        <button class="mode-tab active" onclick="switchMode('quick')" id="tab-quick">Quick Text</button>
        <button class="mode-tab" onclick="switchMode('place')" id="tab-place">Place Text</button>
        <button class="mode-tab" onclick="switchMode('draw')" id="tab-draw">Draw</button>
      </div>

      <!-- Quick Text -->
      <div class="panel visible" id="panel-quick">
        <div style="margin-bottom:.55rem">
          <label>Top text</label>
          <input type="text" id="topText" placeholder="TOP TEXT" oninput="renderMeme()">
        </div>
        <div style="margin-bottom:.55rem">
          <label>Bottom text</label>
          <input type="text" id="botText" placeholder="BOTTOM TEXT" oninput="renderMeme()">
        </div>
        <div class="row">
          <label>Font</label>
          <select id="quickFont" onchange="renderMeme()">
            <option value="Impact">Impact</option>
            <option value="Arial Black">Arial Black</option>
            <option value="Comic Sans MS">Comic Sans</option>
            <option value="Georgia">Georgia</option>
          </select>
        </div>
        <div class="row">
          <label>Size</label>
          <input type="range" id="quickSize" min="20" max="100" value="48" oninput="renderMeme(); document.getElementById('quickSizeVal').textContent=this.value">
          <span class="size-val" id="quickSizeVal">48</span>
        </div>
        <div class="row">
          <label>Fill</label>
          <input type="color" id="quickColor" value="#ffffff" oninput="renderMeme()">
          <label style="margin-left:8px">Outline</label>
          <input type="color" id="quickOutline" value="#000000" oninput="renderMeme()">
        </div>
      </div>

      <!-- Place Text -->
      <div class="panel" id="panel-place">
        <p class="tip">Click on the canvas to place text. Drag to reposition.</p>
        <div style="margin-bottom:.5rem">
          <label>Text</label>
          <input type="text" id="placeText" placeholder="Your text here" value="Your text">
        </div>
        <div class="row">
          <label>Font</label>
          <select id="placeFont">
            <option value="Impact">Impact</option>
            <option value="Arial Black">Arial Black</option>
            <option value="Comic Sans MS">Comic Sans</option>
            <option value="Georgia">Georgia</option>
          </select>
        </div>
        <div class="row">
          <label>Size</label>
          <input type="range" id="placeSize" min="12" max="100" value="36" oninput="document.getElementById('placeSizeVal').textContent=this.value">
          <span class="size-val" id="placeSizeVal">36</span>
        </div>
        <div class="row">
          <label>Fill</label>
          <input type="color" id="placeColor" value="#ffffff">
          <label style="margin-left:8px">Outline</label>
          <input type="color" id="placeOutline" value="#000000">
        </div>
        <div class="tool-group" style="margin-top:.5rem">
          <button class="tool-btn" onclick="clearTextBoxes()">🗑 Clear all</button>
        </div>
      </div>

      <!-- Draw -->
      <div class="panel" id="panel-draw">
        <div class="tool-group" style="margin-bottom:.6rem">
          <button class="tool-btn active" id="toolPen" onclick="setDrawTool('pen')">✏️ Pen</button>
          <button class="tool-btn" id="toolEraser" onclick="setDrawTool('eraser')">⬜ Eraser</button>
        </div>
        <div class="row">
          <label>Color</label>
          <input type="color" id="drawColor" value="#ff3b3b">
        </div>
        <div class="row">
          <label>Size</label>
          <input type="range" id="brushSize" min="1" max="40" value="4" oninput="document.getElementById('brushSizeVal').textContent=this.value">
          <span class="size-val" id="brushSizeVal">4</span>
        </div>
        <div class="row">
          <label>Opacity</label>
          <input type="range" id="brushOpacity" min="10" max="100" value="100" oninput="document.getElementById('brushOpacityVal').textContent=this.value+'%'">
          <span class="size-val" id="brushOpacityVal">100%</span>
        </div>
        <div class="undo-row" style="margin-top:.5rem">
          <button id="undoBtn" onclick="undo()" disabled>↩ Undo</button>
          <button id="redoBtn" onclick="redo()" disabled>↪ Redo</button>
          <button onclick="clearDrawing()">🗑 Clear</button>
        </div>
      </div>
    </div>

    <hr>

    <div class="section-block">
      <button class="download-btn" onclick="downloadMeme()">⬇ Download PNG</button>
    </div>

  </div>

  <!-- Canvas -->
  <div class="main">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="baseCanvas"></canvas>
      <canvas id="drawCanvas" style="position:absolute;top:0;left:0;"></canvas>
    </div>
    <div class="hint" id="hint">↑ Pick a template above · or upload your own image · then add text or draw</div>
  </div>
</div>

<script>
// ─── Templates ─────────────────────────────────────────────────────────────
const TEMPLATES = [
  { name: 'Drake',            url: 'https://i.imgflip.com/30b1gx.jpg' },
  { name: 'Distracted BF',   url: 'https://i.imgflip.com/1ur9b0.jpg' },
  { name: 'Woman Yelling',   url: 'https://i.imgflip.com/345v97.jpg' },
  { name: 'This Is Fine',    url: 'https://i.imgflip.com/wxica.jpg' },
  { name: 'Two Buttons',     url: 'https://i.imgflip.com/1g8my4.jpg' },

  { name: 'Change My Mind',  url: 'https://i.imgflip.com/24y43o.jpg' },

  { name: 'Disaster Girl',   url: 'https://i.imgflip.com/23ls.jpg' },
  { name: 'Doge',            url: 'https://i.imgflip.com/4t0m5.jpg' },
  { name: 'Hide The Pain',   url: 'https://i.imgflip.com/gk5el.jpg' },
  { name: 'Picard FP',       url: 'https://i.imgflip.com/2cp1.jpg' },

  { name: 'Epic Handshake',  url: 'https://i.imgflip.com/28j0te.jpg' },
  { name: 'Boardroom',       url: 'https://i.imgflip.com/m78d.jpg' },
  { name: 'Is This a...',    url: 'https://i.imgflip.com/1o00in.jpg' },
  { name: 'Uno Reverse',     url: 'https://i.imgflip.com/3lmzyx.jpg' },
  { name: 'Chad vs Virgin',  url: 'https://i.imgflip.com/261o3j.jpg' },
  { name: 'Pikachu',         url: 'https://i.imgflip.com/vc0k4p.jpg' },
  { name: 'Tuxedo Pooh',     url: 'https://i.imgflip.com/9ehkjl.jpg' },
  { name: 'That\'d Be Great',url: 'https://i.imgflip.com/1bhk.jpg' },
  { name: 'Always Has Been', url: 'https://i.imgflip.com/gdk4ya.jpg' },
  { name: 'Stonks',          url: 'https://i.imgflip.com/mhzzou.jpg' },
  { name: 'Grumpy Cat',      url: 'https://i.imgflip.com/8p0a.jpg' },
  { name: 'Success Kid',     url: 'https://i.imgflip.com/2hgfw.jpg' },
  { name: 'Ancient Aliens',  url: 'https://i.imgflip.com/1e7ql7.jpg' },
  { name: 'But That\'s None',url: 'https://i.imgflip.com/3wn.jpg' },
  { name: 'Y U No',          url: 'https://i.imgflip.com/3si4.jpg' },
  { name: 'First World Probs',url:'https://i.imgflip.com/b2.jpg' },
  { name: 'Bad Luck Brian',  url: 'https://i.imgflip.com/5.jpg' },
  { name: 'Overly Attached', url: 'https://i.imgflip.com/1xk4.jpg' },
  { name: 'Good Guy Greg',   url: 'https://i.imgflip.com/6.jpg' },
  { name: 'Scumbag Steve',   url: 'https://i.imgflip.com/2.jpg' },
  { name: 'One Does Not',    url: 'https://i.imgflip.com/1bij.jpg' },
  { name: 'Everywhere',      url: 'https://i.imgflip.com/1h7in3.jpg' },
  { name: 'Captain Picard',  url: 'https://i.imgflip.com/2cp1.jpg' },
  { name: 'Confession Bear', url: 'https://i.imgflip.com/clg.jpg' },
  { name: 'Philosoraptor',   url: 'https://i.imgflip.com/11h.jpg' },
  { name: 'Leonardo Cheers', url: 'https://i.imgflip.com/3u0x3.jpg' },
  { name: 'Roll Safe',       url: 'https://i.imgflip.com/1h7in3.jpg' },
];

// ─── State ──────────────────────────────────────────────────────────────────
let currentImg = null, mode = 'quick', drawTool = 'pen';
let isDrawing = false, lastX = 0, lastY = 0;
let textBoxes = [], dragging = null, dragOffX = 0, dragOffY = 0;
let undoStack = [], redoStack = [];
const MAX_UNDO = 20;

const baseCanvas = document.getElementById('baseCanvas');
const drawCanvas = document.getElementById('drawCanvas');
const bctx = baseCanvas.getContext('2d');
const dctx = drawCanvas.getContext('2d');

// ─── Build template strip ───────────────────────────────────────────────────
const grid = document.getElementById('templateGrid');
// Deduplicate by URL before rendering
const seen = new Set();
TEMPLATES.filter(t => { if (seen.has(t.url)) return false; seen.add(t.url); return true; })
  .forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'template-thumb';
    div.dataset.idx = i;
    div.innerHTML = `<img src="${t.url}" crossorigin="anonymous" alt="${t.name}" loading="lazy"><div class="template-name">${t.name}</div>`;
    div.onclick = () => loadTemplate(t.url, div);
    grid.appendChild(div);
  });

// ─── Load image ─────────────────────────────────────────────────────────────
function loadTemplate(url, el) {
  document.querySelectorAll('.template-thumb').forEach(d => d.classList.remove('active'));
  if (el) el.classList.add('active');
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { currentImg = img; setupCanvas(img.width, img.height); renderMeme(); };
  img.onerror = () => { img.crossOrigin = null; img.src = url; };
  img.src = url;
  document.getElementById('hint').style.display = 'none';
}

document.getElementById('imgUpload').onchange = e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { currentImg = img; setupCanvas(img.width, img.height); renderMeme(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  document.querySelectorAll('.template-thumb').forEach(d => d.classList.remove('active'));
  document.getElementById('hint').style.display = 'none';
};

function setupCanvas(w, h) {
  const maxW = Math.min(720, window.innerWidth - 260);
  const maxH = window.innerHeight - 180;
  let scale = 1;
  if (w > maxW) scale = maxW / w;
  if (h * scale > maxH) scale = maxH / h;
  const cw = Math.round(w * scale), ch = Math.round(h * scale);
  baseCanvas.width = cw; baseCanvas.height = ch;
  drawCanvas.width = cw; drawCanvas.height = ch;
  dctx.clearRect(0, 0, cw, ch);
  undoStack = []; redoStack = [];
  textBoxes = [];
  updateUndoButtons();
}

// ─── Render ──────────────────────────────────────────────────────────────────
function renderMeme() {
  if (!currentImg) return;
  bctx.clearRect(0, 0, baseCanvas.width, baseCanvas.height);
  bctx.drawImage(currentImg, 0, 0, baseCanvas.width, baseCanvas.height);

  const font = document.getElementById('quickFont').value;
  const size = parseInt(document.getElementById('quickSize').value);
  const color = document.getElementById('quickColor').value;
  const outline = document.getElementById('quickOutline').value;
  const topText = document.getElementById('topText').value;
  const botText = document.getElementById('botText').value;

  bctx.font = `900 ${size}px "${font}", Impact, sans-serif`;
  bctx.textAlign = 'center';
  bctx.lineWidth = size / 8;
  bctx.strokeStyle = outline;
  bctx.fillStyle = color;
  bctx.lineJoin = 'round';

  if (topText) {
    bctx.strokeText(topText, baseCanvas.width / 2, size + 8);
    bctx.fillText(topText, baseCanvas.width / 2, size + 8);
  }
  if (botText) {
    bctx.strokeText(botText, baseCanvas.width / 2, baseCanvas.height - 12);
    bctx.fillText(botText, baseCanvas.width / 2, baseCanvas.height - 12);
  }

  textBoxes.forEach(tb => {
    bctx.font = `900 ${tb.size}px "${tb.font}", Impact, sans-serif`;
    bctx.textAlign = 'left';
    bctx.lineWidth = tb.size / 8;
    bctx.strokeStyle = tb.outline;
    bctx.fillStyle = tb.color;
    bctx.lineJoin = 'round';
    bctx.strokeText(tb.text, tb.x, tb.y);
    bctx.fillText(tb.text, tb.x, tb.y);
  });
}

// ─── Mode ────────────────────────────────────────────────────────────────────
function switchMode(m) {
  mode = m;
  ['quick','place','draw'].forEach(id => {
    document.getElementById(`tab-${id}`).classList.toggle('active', id === m);
    document.getElementById(`panel-${id}`).classList.toggle('visible', id === m);
  });
  drawCanvas.style.cursor = m === 'draw' ? 'crosshair' : m === 'place' ? 'cell' : 'default';
  drawCanvas.style.pointerEvents = (m === 'draw' || m === 'place') ? 'auto' : 'none';
}

// ─── Draw ────────────────────────────────────────────────────────────────────
function setDrawTool(t) {
  drawTool = t;
  document.getElementById('toolPen').classList.toggle('active', t === 'pen');
  document.getElementById('toolEraser').classList.toggle('active', t === 'eraser');
}

drawCanvas.addEventListener('mousedown', e => {
  if (!currentImg) return;
  if (mode === 'draw') {
    saveUndoState(); isDrawing = true;
    const r = drawCanvas.getBoundingClientRect();
    lastX = e.clientX - r.left; lastY = e.clientY - r.top;
  } else if (mode === 'place') {
    const r = drawCanvas.getBoundingClientRect();
    const cx = e.clientX - r.left, cy = e.clientY - r.top;
    const hit = textBoxes.slice().reverse().find(tb => {
      dctx.font = `900 ${tb.size}px "${tb.font}"`;
      const w = dctx.measureText(tb.text).width;
      return cx >= tb.x && cx <= tb.x + w && cy <= tb.y && cy >= tb.y - tb.size;
    });
    if (hit) { dragging = hit; dragOffX = cx - hit.x; dragOffY = cy - hit.y; }
    else {
      textBoxes.push({
        text: document.getElementById('placeText').value || 'Text',
        font: document.getElementById('placeFont').value,
        size: parseInt(document.getElementById('placeSize').value),
        color: document.getElementById('placeColor').value,
        outline: document.getElementById('placeOutline').value,
        x: cx, y: cy
      });
      renderMeme();
    }
  }
});

drawCanvas.addEventListener('mousemove', e => {
  if (mode === 'draw' && isDrawing) {
    const r = drawCanvas.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    dctx.globalCompositeOperation = drawTool === 'eraser' ? 'destination-out' : 'source-over';
    dctx.globalAlpha = parseInt(document.getElementById('brushOpacity').value) / 100;
    dctx.strokeStyle = document.getElementById('drawColor').value;
    dctx.lineWidth = parseInt(document.getElementById('brushSize').value);
    dctx.lineCap = 'round'; dctx.lineJoin = 'round';
    dctx.beginPath(); dctx.moveTo(lastX, lastY); dctx.lineTo(x, y); dctx.stroke();
    lastX = x; lastY = y;
  } else if (mode === 'place' && dragging) {
    const r = drawCanvas.getBoundingClientRect();
    dragging.x = e.clientX - r.left - dragOffX;
    dragging.y = e.clientY - r.top - dragOffY;
    renderMeme();
  }
});

window.addEventListener('mouseup', () => {
  isDrawing = false; dragging = null;
  dctx.globalCompositeOperation = 'source-over'; dctx.globalAlpha = 1;
});

drawCanvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; drawCanvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY })); }, { passive: false });
drawCanvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; drawCanvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY })); }, { passive: false });
drawCanvas.addEventListener('touchend', () => drawCanvas.dispatchEvent(new MouseEvent('mouseup')));

// ─── Undo / Redo ─────────────────────────────────────────────────────────────
function saveUndoState() {
  undoStack.push(dctx.getImageData(0, 0, drawCanvas.width, drawCanvas.height));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = []; updateUndoButtons();
}
function undo() { if (!undoStack.length) return; redoStack.push(dctx.getImageData(0,0,drawCanvas.width,drawCanvas.height)); dctx.putImageData(undoStack.pop(),0,0); updateUndoButtons(); }
function redo() { if (!redoStack.length) return; undoStack.push(dctx.getImageData(0,0,drawCanvas.width,drawCanvas.height)); dctx.putImageData(redoStack.pop(),0,0); updateUndoButtons(); }
function clearDrawing() { saveUndoState(); dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height); }
function clearTextBoxes() { textBoxes = []; renderMeme(); }
function updateUndoButtons() {
  document.getElementById('undoBtn').disabled = undoStack.length === 0;
  document.getElementById('redoBtn').disabled = redoStack.length === 0;
}

// ─── Download ─────────────────────────────────────────────────────────────────
function downloadMeme() {
  if (!currentImg) { alert('Pick a template first!'); return; }
  const out = document.createElement('canvas');
  out.width = baseCanvas.width; out.height = baseCanvas.height;
  const ctx = out.getContext('2d');
  ctx.drawImage(baseCanvas, 0, 0);
  ctx.drawImage(drawCanvas, 0, 0);
  const a = document.createElement('a');
  a.download = 'meme.png'; a.href = out.toDataURL('image/png'); a.click();
}

switchMode('quick');
</script>
